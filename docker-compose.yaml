services:
  timmygram:
    build:
      context: .
      dockerfile: Dockerfile
    image: timmygram:latest
    container_name: timmygram
    restart: unless-stopped
    ports:
      - "${TIMMYGRAM_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      JWT_SECRET: "${JWT_SECRET:-your-strong-secret-key-here}"
    volumes:
      # Mount your local config file into the container.
      - "${TIMMYGRAM_CONFIG_PATH:-./config.yaml}:/app/config.yaml:ro"

      # Mount your local videos directory into the container.
      - "${TIMMYGRAM_VIDEOS_PATH:-./videos}:/app/videos"

      # Optional: keep SQLite database files persistent.
      - "${TIMMYGRAM_DATA_PATH:-./data}:/app/data"