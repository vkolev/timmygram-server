{{ template "dashboard-base" . }}

{{ define "content" }}
<div class="dashboard-content">
    <div class="dashboard-welcome">
        <p class="eyebrow">Account</p>
        <h1>Change password</h1>
        <p class="dashboard-subtitle">Choose a strong password of at least 6 characters.</p>
    </div>

    <section class="dashboard-section">
        {{ if .success }}
        <p class="form-success">{{ .success }}</p>
        {{ end }}

        {{ if .error }}
        <p class="form-error">{{ .error }}</p>
        {{ end }}

        <form method="post" action="/account/password" class="upload-form">
            <div class="upload-field">
                <label for="current_password">Current password</label>
                <input id="current_password" name="current_password" type="password"
                       autocomplete="current-password" required>
            </div>

            <div class="upload-field">
                <label for="new_password">New password</label>
                <input id="new_password" name="new_password" type="password"
                       autocomplete="new-password" required>
            </div>

            <div class="upload-field">
                <label for="confirm_password">Confirm new password</label>
                <input id="confirm_password" name="confirm_password" type="password"
                       autocomplete="new-password" required>
            </div>

            <div class="upload-actions">
                <button type="submit" class="button">Update password</button>
                <a href="/dashboard" class="button button-secondary">Cancel</a>
            </div>
        </form>
    </section>
</div>
{{ end }}
