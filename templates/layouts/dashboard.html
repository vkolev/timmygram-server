{{ define "dashboard-base" }}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .title }}</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="icon" href="/static/favicon/favicon.ico" sizes="any">
    <link rel="icon" href="/static/favicon/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/static/favicon/site.webmanifest">
</head>
<body class="dashboard-body">

<header class="dashboard-header">
    <div class="dashboard-header-inner">
        <a class="brand" href="/dashboard">
            <img class="brand-mark" src="/static/favicon/favicon.svg" alt="Timmygram logo">
            <span>Timmygram</span>
        </a>

        <nav class="dashboard-nav-links">
            <a href="/dashboard" class="{{ if eq .page "dashboard" }}active{{ end }}">My Feed</a>
            <a href="/devices" class="{{ if eq .page "devices" }}active{{ end }}">Devices</a>
            {{ if and .MultiUser .is_owner }}
            <a href="/users" class="{{ if eq .page "users" }}active{{ end }}">Users</a>
            {{ end }}
        </nav>

        <div class="dashboard-user">
            <span class="dashboard-username">{{ .username }}</span>
            <a href="/account/password" class="button button-small button-outline {{ if eq .page "change_password" }}active{{ end }}">Account</a>
            <form method="post" action="/logout">
                <button type="submit" class="button button-small button-outline">Logout</button>
            </form>
        </div>
    </div>
</header>

<main class="dashboard-main">
    {{ template "content" . }}
</main>

<footer class="site-footer">
    <p>Built for families. Made for safe little moments.</p>
    <p class="muted">&copy; TimmyGram v: {{ .AppVersion }}</p>
</footer>

<script src="/static/js/dashboard.js" defer></script>

</body>
</html>
{{ end }}
